spring.application.name=manager

# Active profile can be overridden by environment or IDE run config
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# STORAGE CONFIGURATION
# ===================================================================
# Storage provider (minio, s3, gcs, azure)
storage.provider=${STORAGE_PROVIDER:minio}
storage.documents-folder=documents/
storage.thumbnails-folder=thumbnails/
storage.avatars-folder=avatars/

# Database Configuration
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/studydocs_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username = ${DB_USERNAME:root}
spring.datasource.password = ${DB_PASSWORD}
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto = ${JPA_DDL_AUTO:update}
spring.jpa.show-sql = ${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql = true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Redis config
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

#Elasticsearch config
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}
spring.data.elasticsearch.repositories.enabled=false


# Mail configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Rate Limit Configuration
security.rate-limit.login-per-minute=20
security.rate-limit.register-per-minute=5
security.rate-limit.forgot-password-per-minute=5

# MinIO Configuration
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket-name=${MINIO_BUCKET_NAME:studydocs-documents}
minio.documents-folder=documents/
minio.thumbnails-folder=thumbnails/

# Scheduled Cleanup Configuration
# ===================================================================
# Automatic cleanup of files from storage after documents are soft-deleted
cleanup.deleted-files.enabled=true
cleanup.deleted-files.retention-days=0
cleanup.deleted-files.cron=0 */2 * * * *
# Cron format: second minute hour day month weekday
# Default: 0 0 2 * * * = Daily at 2:00 AM

# Trash DB Purge Configuration
# ===================================================================
# Automatically hard-delete Document DB records after file has been cleaned
# AND document has been in trash longer than trash.retention-days
# Runs 1 hour AFTER FileCleanupService to ensure files are cleaned first
cleanup.trash.enabled=true
cleanup.trash.retention-days=0
cleanup.trash.cron=0 1-59/2 * * * *
# Default: 0 0 3 * * * = Daily at 3:00 AM

# Folder Trash Purge Configuration
# ===================================================================
# Automatically hard-delete deleted folder trees after file cleanup has completed
cleanup.folder-trash.enabled=true
cleanup.folder-trash.retention-days=0
cleanup.folder-trash.cron=40 1-59/2 * * * *
# Default: 0 15 3 * * * = Daily at 3:15 AM

# Elasticsearch Search Configuration
# ===================================================================
# Document search and indexing settings
search.indexing.enabled=false
search.full-text.max-length=10000
search.highlight.enabled=false
search.highlight.pre-tag=<em class="highlight">
search.highlight.post-tag=</em>
search.fuzzy.enabled=false
search.fuzzy.fuzziness=AUTO
search.max-page-size=50
